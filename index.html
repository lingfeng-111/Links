<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234a6fa5'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='50'%3E🔗%3C/text%3E%3C/svg%3E">
<title>临风资源库</title>
<style>
:root{--accent:#4a6fa5;--radius:14px;--card-bg:rgba(255,255,255,.85);--card-border:rgba(0,0,0,.08);--text:#2c2c2c;--text2:#6b6b7b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif;color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:40px 16px 80px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:#f3f2ef}
.container{width:100%;max-width:500px;position:relative;z-index:1}
.profile{text-align:center;padding:30px 0 32px}
.avatar-wrap{display:inline-block}
.avatar{width:86px;height:86px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,0,0,.06);background:#e8e8e8}
.name{font-size:1.25rem;font-weight:700;margin:14px 0 6px;color:var(--text)}
.bio{font-size:.82rem;color:var(--text2);line-height:1.6;padding:0 20px;max-width:360px;margin:0 auto}
.section-title{text-align:center;font-size:.7rem;color:#aaa;letter-spacing:2px;margin:8px 0 16px}
.section-header{text-align:center;font-size:.82rem;font-weight:700;margin:20px 0 12px;padding:8px 0;letter-spacing:1px}
.section-header.today{color:#e67e22;border-bottom:2px solid rgba(230,126,34,.25)}
.section-header.archive{color:#888;border-bottom:2px solid rgba(0,0,0,.08)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;padding:0 4px}
.cat-tab{padding:7px 16px;border-radius:50px;font-size:.78rem;cursor:pointer;background:rgba(255,255,255,.7);color:#888;border:1px solid rgba(0,0,0,.06);user-select:none;white-space:nowrap}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.links{display:flex;flex-direction:column;gap:10px}
.link-card{display:flex;align-items:center;gap:14px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 18px;text-decoration:none;color:var(--text);cursor:pointer}
.link-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#eee;flex-shrink:0}
.link-info{flex:1;min-width:0}
.link-title{font-size:.9rem;font-weight:600;margin-bottom:2px}
.link-desc{font-size:.74rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-arrow{color:#bbb;font-size:1rem;flex-shrink:0}
.footer{text-align:center;padding:36px 0 20px;color:#bbb;font-size:.7rem}
/* Search */
.search-btn{position:fixed;top:20px;left:20px;z-index:20;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06);color:#999;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.search-bar-wrap{position:fixed;top:20px;left:68px;z-index:20;display:none;align-items:center;gap:8px}
.search-bar-wrap.show{display:flex}
.search-bar-wrap input{width:200px;padding:9px 14px;border-radius:50px;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.08);color:var(--text);font-size:.82rem;outline:none}
.search-bar-wrap input::placeholder{color:#aaa}
.search-clear{background:none;border:none;color:#999;cursor:pointer;font-size:1rem;padding:4px}
/* QR */
.qr-float{position:fixed;top:20px;right:20px;z-index:20;text-align:center}
.qr-img{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#eee;border:1px solid rgba(0,0,0,.08);cursor:pointer}
.qr-label{font-size:.65rem;color:#aaa;margin-top:4px;letter-spacing:.5px}
.qr-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;cursor:pointer}
.qr-modal.show{display:flex}
.qr-modal img{max-width:280px;max-height:280px;border-radius:16px;border:2px solid rgba(0,0,0,.1)}
@media(max-width:500px){.container{padding-top:16px}.profile{padding:20px 0 24px}.link-card{padding:12px 14px}.search-btn{top:12px;left:12px}.search-bar-wrap{top:12px;left:60px}.search-bar-wrap input{width:150px}.qr-float{top:12px;right:12px}.qr-img{width:52px;height:52px}}
</style>
</head>
<body>
<!-- SEARCH -->
<button class="search-btn" id="searchToggle">🔍</button>
<div class="search-bar-wrap" id="searchBarWrap">
  <input type="text" id="searchInput" placeholder="搜索资源...">
  <button class="search-clear" id="searchClear">✕</button>
</div>
<!-- QR -->
<div class="qr-float">
  <img class="qr-img" src="images/erweima.png" alt="微信二维码">
  <div class="qr-label">扫一扫添加我吧</div>
</div>
<div class="qr-modal" id="qrModal">
  <img src="images/erweima.png" alt="微信二维码大图">
</div>

<div class="container">
  <div class="profile">
    <div class="avatar-wrap"><img class="avatar" src="images/touxiang.png" alt="头像"></div>
    <div class="name" id="profileName"></div>
    <div class="bio" id="profileBio"></div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="links" id="linksContainer"></div>
  <div class="footer">© 2025 临风资源库</div>
</div>

<script>
var DATA = {"profile":{"avatar":"https://lingfeng-111.github.io/Links/images/touxiang.png","name":"临风资源库","bio":"分享AI工具 · 副业实操 · 英语学习资源· 自我提升\n关注我，一起搞钱","qrCode":"https://lingfeng-111.github.io/Links/images/erweima.png"},"background":{"type":"warm","url":"","opacity":58},"links":[{"title":"美国幼儿园原版教材免费领","desc":"内含200+高清PDF，在线即学，英语启蒙必备","image":"","url":"https://pan.quark.cn/s/1f88984a0395","cat":"学习资源","dateAdded":"2026-05-25"},{"title":"免费无二次收费的数据恢复神器","desc":"小白也能秒上手","image":"","url":"https://pan.quark.cn/s/12a99fe0aa77","cat":"其他资源","dateAdded":"2026-05-24"},{"title":"C盘拯救神器","desc":"深度清理系统垃圾","image":"","url":"https://pan.quark.cn/s/1ec6b80a5310","cat":"其他资源","dateAdded":"2026-05-23"},{"title":"BBC耳朵按摩术","desc":"52期听力合集 音频视频双语文本","image":"","url":"https://pan.quark.cn/s/3bd22620a602","cat":"学习资源","dateAdded":"2026-05-23"},{"title":"50个AI副业分享","desc":"普通人的AI时代变现机会","image":"","url":"https://pan.quark.cn/s/70ad07ec08a7","cat":"副业赚钱","dateAdded":"2026-05-22"},{"title":"童年街机 在线畅玩","desc":"找回儿时游戏快乐","image":"","url":"https://ggemu.com/zh-CN","cat":"其他资源","dateAdded":"2026-05-20"},{"title":"Image2生图钥匙扣副业保姆级玩法","desc":"低成本启动，值得一试","image":"","url":"https://pan.quark.cn/s/dc98958dfb9d","cat":"副业赚钱","dateAdded":"2026-05-20"},{"title":"个人提示词分享","desc":"个人使用的提示词20＋  适合个人发朋友圈小红书 更新中ing","image":"","url":"https://ecnqjsv1dgi9.feishu.cn/wiki/L2cswQAu3iv9HWkC3AqcseLZntc?from=from_copylink","cat":"AI工具","dateAdded":"2026-05-20"},{"title":"商用提示词分享","desc":"适合商用的提示词分享，可以接广告发挥自己的想法 更新中ing","image":"","url":"https://ecnqjsv1dgi9.feishu.cn/wiki/VWGiwQddyiGIqQkzn4fccxUWnwf?from=from_copylink","cat":"AI工具","dateAdded":"2026-05-20"},{"title":"GPT Image2.0 热门 AI 提示词","desc":"自媒体+电商+AI变现","image":"","url":"https://pan.quark.cn/s/1b8e9b527d09","cat":"AI工具","dateAdded":"2026-05-20"},{"title":"世界名著超级大套装(中英双语共108册)","desc":"考研真题+口语教程+外刊精读","image":"","url":"https://pan.quark.cn/s/d18bacb19d33","cat":"学习资源","dateAdded":"2026-05-20"},{"title":"AI新人入门资料","desc":"AI工具指南+AI常见术语+常用AI安装包","image":"","url":"https://pan.quark.cn/s/c2dae25286e1","cat":"AI工具","dateAdded":"2026-05-20"},{"title":"AI进阶资料","desc":"适合对AI有一定了解再学习","image":"","url":"https://pan.quark.cn/s/0d4260911e22","cat":"AI工具","dateAdded":"2026-05-20"},{"title":"手机可点 国外热剧随时看！","desc":"超全影视站","image":"","url":"https://www.xcyycn.com/","cat":"影视推荐","dateAdded":"2026-05-20"},{"title":"4K原盘电影在线观看下载","desc":"高清电影下载","image":"","url":"https://pomo.mom/","cat":"影视推荐","dateAdded":"2026-05-20"}]};
var activeCat='all',searchTerm='';
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function gi(i){var c=['#4a6fa5','#6b8cae','#8fa4c4','#a0b0c0','#5a7a95','#3a5a7a','#7890a5','#6888a0'][i%8];return'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="'+c+'" rx="20" opacity=".15"/><text x="50" y="62" text-anchor="middle" fill="'+c+'" font-size="36" font-family="sans-serif" opacity=".7">📦</text></svg>')}
function render(){
  var p=DATA.profile;
  document.getElementById('profileName').textContent=p.name;
  document.getElementById('profileBio').textContent=p.bio;
  var cats=['all','学习资源','副业赚钱','AI工具','影视推荐','其他资源'];
  var cl={all:'全部','学习资源':'📚 学习','副业赚钱':'💰 副业','AI工具':'🤖 AI','影视推荐':'🎬 影视','其他资源':'📦 其他'};
  document.getElementById('catTabs').innerHTML=cats.map(function(c){return'<span class="cat-tab'+(c===activeCat?' active':'')+'" data-cat="'+c+'">'+cl[c]+'</span>'}).join('');
  var filtered=activeCat==='all'?DATA.links:DATA.links.filter(function(l){return(l.cat||'其他资源')===activeCat});
  if(searchTerm){var q=searchTerm.toLowerCase();filtered=filtered.filter(function(l){return l.title.toLowerCase().indexOf(q)>-1||(l.desc||'').toLowerCase().indexOf(q)>-1})}
  var today=(new Date()).toISOString().slice(0,10);var tl=filtered.filter(function(l){return l.dateAdded===today});var ol=filtered.filter(function(l){return l.dateAdded!==today});var ch=function(l,i){return'<a href="'+esc(l.url)+'" target="_blank" rel="noopener" class="link-card"><img class="link-thumb" src="'+(l.image||gi(i))+'" onerror="this.src=\''+gi(i)+'\'" alt=""><div class="link-info"><div class="link-title">'+esc(l.title)+'</div>'+(l.desc?'<div class="link-desc">'+esc(l.desc)+'</div>':'')+'</div><span class="link-arrow">→</span></a>'};var html='';if(tl.length)html+='<div class="section-header today">🔥 今日视频同款</div>'+tl.map(ch).join('');if(ol.length)html+='<div class="section-header archive">📁 往期资源</div>'+ol.map(function(l,i){return ch(l,i+1000)}).join('');if(!html)html='<div style="text-align:center;color:#bbb;padding:30px 0;font-size:.82rem">暂无资源</div>';document.getElementById('linksContainer').innerHTML=html}
document.getElementById('catTabs').addEventListener('click',function(e){var t=e.target.closest('.cat-tab');if(!t)return;activeCat=t.dataset.cat;render()});
// Search
document.getElementById('searchToggle').addEventListener('click',function(){var w=document.getElementById('searchBarWrap');w.classList.toggle('show');if(w.classList.contains('show'))document.getElementById('searchInput').focus();else{searchTerm='';document.getElementById('searchInput').value='';render()}});
document.getElementById('searchInput').addEventListener('input',function(e){searchTerm=e.target.value.trim();render()});
document.getElementById('searchClear').addEventListener('click',function(){document.getElementById('searchInput').value='';searchTerm='';render();document.getElementById('searchBarWrap').classList.remove('show')});
// QR enlarge
document.querySelector('.qr-img').addEventListener('click',function(){document.getElementById('qrModal').classList.add('show')});
document.getElementById('qrModal').addEventListener('click',function(){document.getElementById('qrModal').classList.remove('show')});
render();
</script>
</body>
</html>
