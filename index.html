<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的主页</title>
<style>
:root{
  --accent:#00d4ff; --accent2:#7b2fff; --radius:16px;
  --glass-bg:rgba(15,15,30,.65); --glass-border:rgba(255,255,255,.08);
  --text:#eef0f6; --text2:#8b90a5;
}
*{margin:0;padding:0;box-sizing:border-box}

/* ===== Background Layer ===== */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif;
  color:var(--text); min-height:100vh;
  display:flex;justify-content:center;padding:40px 16px 80px;
  position:relative;overflow-x:hidden;
}
#bgLayer{
  position:fixed;inset:0;z-index:-2;
  background:#080812;
}
#bgImage{
  position:fixed;inset:0;z-index:-1;opacity:.35;
  background-size:cover;background-position:center;
  background-repeat:no-repeat;
}
/* Animated grid overlay */
#gridOverlay{
  position:fixed;inset:0;z-index:-1;
  background-image:
    linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{
  0%{background-position:0 0}
  100%{background-position:40px 40px}
}
/* Subtle glow orb */
#glowOrb{
  position:fixed;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.06),transparent 70%);
  top:-200px;right:-100px;z-index:-1;pointer-events:none;
  animation:orbFloat 12s ease-in-out infinite;
}
#glowOrb2{
  position:fixed;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(123,47,255,.05),transparent 70%);
  bottom:-150px;left:-100px;z-index:-1;pointer-events:none;
  animation:orbFloat 15s ease-in-out infinite reverse;
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(30px,-20px)}
  66%{transform:translate(-20px,10px)}
}

.container{width:100%;max-width:500px;position:relative;z-index:1}

/* ===== Glass Card Mixin ===== */
.glass{
  background:var(--glass-bg);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
}

/* ===== Profile ===== */
.profile{text-align:center;padding:30px 0 32px}
.avatar-wrap{position:relative;display:inline-block}
.avatar-wrap::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:.4;z-index:-1;filter:blur(8px);
}
.avatar{
  width:90px;height:90px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(255,255,255,.15);background:#1a1a2e;
  transition:transform 300ms;position:relative;z-index:1;
}
.avatar:hover{transform:scale(1.05)}
.name{
  font-size:1.3rem;font-weight:800;margin:16px 0 6px;
  letter-spacing:.5px;
  background:linear-gradient(135deg,#eef0f6,#a0b0d0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.bio{
  font-size:.82rem;color:var(--text2);line-height:1.6;
  padding:0 20px;max-width:360px;margin:0 auto;
}

/* ===== Section Title ===== */
.section-title{
  text-align:center;font-size:.72rem;color:rgba(255,255,255,.25);
  letter-spacing:3px;text-transform:uppercase;margin:8px 0 16px;
}

/* ===== Category Tabs ===== */
.cat-tabs{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  margin-bottom:16px;padding:0 4px;
}
.cat-tab{
  padding:7px 16px;border-radius:50px;font-size:.78rem;cursor:pointer;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.06);
  transition:all 200ms;user-select:none;white-space:nowrap;
}
.cat-tab:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.cat-tab.active{
  background:rgba(0,212,255,.12);color:var(--accent);
  border-color:rgba(0,212,255,.25);
  box-shadow:0 0 16px rgba(0,212,255,.08);
}

/* ===== Links ===== */
.links{display:flex;flex-direction:column;gap:10px}
.link-card{
  display:flex;align-items:center;gap:14px;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:14px 18px;
  text-decoration:none;color:var(--text);
  transition:all 250ms cubic-bezier(.4,0,.2,1);
  cursor:pointer;position:relative;overflow:hidden;
}
/* Glow line on hover */
.link-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity 250ms;
}
.link-card:hover::before{opacity:.6}
.link-card:hover{
  background:rgba(20,20,45,.8);border-color:rgba(0,212,255,.2);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 40px rgba(0,212,255,.04);
}
.link-card:active{transform:scale(.98)}
.link-thumb{
  width:48px;height:48px;border-radius:12px;object-fit:cover;
  background:rgba(255,255,255,.04);flex-shrink:0;
  border:1px solid rgba(255,255,255,.05);
}
.link-info{flex:1;min-width:0}
.link-title{
  font-size:.9rem;font-weight:600;margin-bottom:2px;
  transition:color 200ms;
}
.link-card:hover .link-title{color:#fff}
.link-desc{font-size:.74rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-arrow{
  color:rgba(255,255,255,.2);font-size:1rem;flex-shrink:0;
  transition:all 250ms;
}
.link-card:hover .link-arrow{color:var(--accent);transform:translateX(3px)}

/* ===== Footer ===== */
.footer{text-align:center;padding:36px 0 20px;color:rgba(255,255,255,.15);font-size:.7rem;letter-spacing:1px}

/* ===== Search & QR Floating ===== */
.search-btn{
  position:fixed;top:20px;left:20px;z-index:20;
  width:40px;height:40px;border-radius:50%;
  background:var(--glass-bg);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:all 200ms;
}
.search-btn:hover{color:var(--accent);border-color:rgba(0,212,255,.3)}
.search-bar-wrap{
  position:fixed;top:20px;left:68px;z-index:20;
  display:none;align-items:center;gap:8px;
}
.search-bar-wrap.show{display:flex}
.search-bar-wrap input{
  width:200px;padding:9px 14px;border-radius:50px;
  background:var(--glass-bg);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);color:#d0d0e0;
  font-size:.82rem;outline:none;transition:border-color 200ms;
}
.search-bar-wrap input:focus{border-color:var(--accent)}
.search-bar-wrap input::placeholder{color:rgba(255,255,255,.25)}
.search-clear{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:1rem;padding:4px}

.qr-float{
  position:fixed;top:20px;right:20px;z-index:20;text-align:center;
}
.qr-img{
  width:64px;height:64px;border-radius:10px;object-fit:cover;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  cursor:pointer;transition:transform 200ms,box-shadow 200ms;
}
.qr-img:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,212,255,.15)}
.qr-label{font-size:.65rem;color:rgba(255,255,255,.3);margin-top:4px;letter-spacing:.5px}

/* QR modal */
.qr-modal{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;cursor:pointer;
}
.qr-modal.show{display:flex}
.qr-modal img{max-width:280px;max-height:280px;border-radius:16px;border:2px solid rgba(255,255,255,.1)}

@media(max-width:500px){
  .search-btn{top:12px;left:12px}
  .search-bar-wrap{top:12px;left:60px}
  .search-bar-wrap input{width:150px}
  .qr-float{top:12px;right:12px}
  .qr-img{width:52px;height:52px}
}
.admin-toggle{
  position:fixed;bottom:24px;right:24px;z-index:99;
  width:46px;height:46px;border-radius:50%;
  border:1px solid rgba(255,255,255,.04);
  background:rgba(15,15,30,.3);backdrop-filter:blur(4px);
  color:rgba(255,255,255,.08);cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 400ms ease;
}
.admin-toggle:hover{
  background:var(--glass-bg);backdrop-filter:blur(12px);
  color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.1);
  box-shadow:0 0 20px rgba(0,212,255,.15);
}

/* ===== Admin Panel ===== */
.admin-panel{
  position:fixed;top:0;right:0;width:100%;max-width:420px;height:100vh;
  background:rgba(8,8,18,.95);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-left:1px solid rgba(255,255,255,.06);z-index:100;
  transform:translateX(100%);transition:transform 280ms cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.admin-panel.open{transform:translateX(0)}
.admin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06);
}
.admin-header h3{font-size:.95rem;color:#e0e0f0;letter-spacing:.5px}
.admin-close{background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer;transition:color 150ms}
.admin-close:hover{color:#fff}
.admin-body{flex:1;overflow-y:auto;padding:16px 20px}
.admin-body label{display:block;font-size:.74rem;color:#666;margin:12px 0 5px;letter-spacing:.5px;text-transform:uppercase}
.admin-body input,.admin-body textarea,.admin-body select{
  width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;color:#d0d0e0;font-size:.85rem;font-family:inherit;
  outline:none;transition:border-color 200ms;
}
.admin-body input:focus,.admin-body textarea:focus,.admin-body select:focus{border-color:var(--accent)}
.admin-body textarea{resize:vertical;min-height:60px}

.admin-body button{
  width:100%;padding:11px;border:none;border-radius:8px;font-size:.84rem;
  font-weight:600;cursor:pointer;transition:all 180ms;margin-top:10px;
  letter-spacing:.3px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{filter:brightness(1.2);box-shadow:0 4px 20px rgba(0,212,255,.25)}
.btn-danger{background:transparent;border:1px solid rgba(231,76,60,.3);color:#e74c3c}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.1);color:#999;margin-top:6px}
.btn-outline:hover{border-color:rgba(255,255,255,.3);color:#ccc}

.link-item{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  border-radius:8px;padding:10px 12px;margin:6px 0;
  display:flex;align-items:center;gap:10px;font-size:.8rem;
}
.link-item .thumb-sm{width:36px;height:36px;border-radius:8px;object-fit:cover;background:rgba(255,255,255,.04)}
.link-item .info{flex:1;min-width:0}
.link-item .info .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#d0d0e0}
.link-item .info .u{font-size:.7rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-item .btns{display:flex;gap:2px;flex-shrink:0}
.link-item .btns button{
  background:none;border:none;color:#555;font-size:.85rem;cursor:pointer;
  padding:4px 6px;border-radius:4px;margin:0;width:auto;
}
.link-item .btns button:hover{background:rgba(255,255,255,.06);color:#999}

.avatar-preview{width:56px;height:56px;border-radius:50%;object-fit:cover;background:#1a1a2e;border:1px solid rgba(255,255,255,.08)}

/* ===== Overlay ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;opacity:0;pointer-events:none;transition:opacity 280ms}
.overlay.show{opacity:1;pointer-events:auto}

/* ===== Background Presets ===== */
.bg-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.bg-preset{
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:all 150ms;
}
.bg-preset:hover,.bg-preset.active{border-color:var(--accent);box-shadow:0 0 12px rgba(0,212,255,.3)}

/* Password dialog */
.pw-dialog{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;
}
.pw-dialog.show{display:flex}
.pw-box{
  background:#141420;border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:24px;width:280px;text-align:center;
}
.pw-box h4{color:#e0e0e0;margin-bottom:16px;font-size:.9rem}
.pw-box input{
  width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  color:#e0e0e0;font-size:.9rem;text-align:center;outline:none;
  transition:border-color 200ms;
}
.pw-box input:focus{border-color:var(--accent)}
.pw-box button{
  width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;
  background:var(--accent);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;
}
.pw-error{color:#e74c3c;font-size:.72rem;margin-top:8px;display:none}
@media(max-width:500px){
  .admin-panel{max-width:100%}
  .container{padding-top:16px}
  .profile{padding:20px 0 24px}
  .link-card{padding:12px 14px}
}
.btn-row{display:flex;gap:6px}
.btn-row button{flex:1}
.export-area{margin-top:16px}
.export-area textarea{font-size:.7rem;max-height:100px}
hr{border-color:rgba(255,255,255,.06);margin:20px 0}
</style>
</head>
<body>

<!-- ===== BACKGROUND LAYERS ===== -->
<div id="bgLayer"></div>
<div id="bgImage"></div>
<div id="gridOverlay"></div>
<div id="glowOrb"></div>
<div id="glowOrb2"></div>

<!-- ===== SEARCH ===== -->
<button class="search-btn" id="searchToggle" title="搜索">🔍</button>
<div class="search-bar-wrap" id="searchBarWrap">
  <input type="text" id="searchInput" placeholder="搜索资源...">
  <button class="search-clear" id="searchClear">✕</button>
</div>

<!-- ===== QR CODE ===== -->
<div class="qr-float">
  <img class="qr-img" id="qrCodeImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a2e' rx='10'/%3E%3Ctext x='50' y='60' text-anchor='middle' fill='%23555' font-size='14' font-family='sans-serif'%3E二维码%3C/text%3E%3C/svg%3E" alt="二维码">
  <div class="qr-label">扫一扫添加我吧</div>
</div>
<div class="qr-modal" id="qrModal">
  <img id="qrModalImg" src="" alt="二维码大图">
</div>

<!-- ===== PUBLIC VIEW ===== -->
<div class="container" id="publicView">
  <div class="profile">
    <div class="avatar-wrap">
      <img class="avatar" id="profileAvatar" src="" alt="头像">
    </div>
    <div class="name" id="profileName">临风</div>
    <div class="bio" id="profileBio">分享AI工具 · 副业实操 · 英语学习资源<br>关注我，一起搞钱</div>
  </div>
  <div class="section-title">Resources</div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="links" id="linksContainer"></div>
  <div class="footer">© 2025 临风</div>
</div>

<!-- ===== PASSWORD DIALOG ===== -->
<div class="pw-dialog" id="pwDialog">
  <div class="pw-box">
    <h4>🔐 管理员验证</h4>
    <input type="password" id="pwInput" placeholder="请输入密码" autocomplete="off">
    <div class="pw-error" id="pwError">密码错误</div>
    <button id="pwSubmit">确认</button>
  </div>
</div>

<!-- ===== ADMIN TOGGLE ===== -->
<button class="admin-toggle" id="adminToggle" title="管理">⚙️</button>

<!-- ===== OVERLAY ===== -->
<div class="overlay" id="overlay"></div>

<!-- ===== ADMIN PANEL ===== -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h3>⚡ 后台管理</h3>
    <button class="admin-close" id="adminClose">✕</button>
  </div>
  <div class="admin-body">
    <!-- Profile -->
    <label>头像URL</label>
    <div style="display:flex;align-items:center;gap:12px">
      <img class="avatar-preview" id="avatarPreview" src="">
      <input type="text" id="editAvatar" placeholder="https://... 或留空用默认" style="flex:1">
    </div>
    <label>昵称</label>
    <input type="text" id="editName" placeholder="你的名字">
    <label>简介</label>
    <textarea id="editBio" placeholder="简短介绍..."></textarea>
    <label>微信二维码URL</label>
    <div style="display:flex;align-items:center;gap:12px">
      <img id="qrPreview" style="width:56px;height:56px;border-radius:8px;object-fit:cover;background:#1a1a2e;border:1px solid rgba(255,255,255,.08)">
      <input type="text" id="editQr" placeholder="https://... 二维码图片链接" style="flex:1">
    </div>
    <button class="btn-primary" id="saveProfile">💾 保存资料</button>

    <hr>

    <!-- Background -->
    <label>🎨 背景设置</label>
    <div style="font-size:.74rem;color:#555;margin-bottom:6px">预设背景</div>
    <div class="bg-presets" id="bgPresets">
      <div class="bg-preset active" data-bg="default" style="background:#080812" title="默认暗黑"></div>
      <div class="bg-preset" data-bg="cyber" style="background:linear-gradient(135deg,#0a0a1a,#0d0d2b)" title="赛博"></div>
      <div class="bg-preset" data-bg="midnight" style="background:linear-gradient(180deg,#0b0b1a,#1a0a2e)" title="午夜紫"></div>
      <div class="bg-preset" data-bg="ocean" style="background:linear-gradient(180deg,#0a1628,#0a1a2e)" title="深海"></div>
      <div class="bg-preset" data-bg="emerald" style="background:linear-gradient(180deg,#0a0f0a,#0a1a12)" title="翡翠"></div>
      <div class="bg-preset" data-bg="custom" style="background:conic-gradient(#333,#666,#333,#666);font-size:10px;display:flex;align-items:center;justify-content:center;color:#aaa" title="自定义">
        <span>📷</span>
      </div>
    </div>
    <label>自定义背景URL</label>
    <input type="text" id="editBg" placeholder="https://... 或本地图片URL">
    <label>背景透明度</label>
    <input type="range" id="editBgOpacity" min="10" max="80" value="35">
    <button class="btn-primary" id="applyBg">🖼️ 应用背景</button>

    <hr>

    <!-- Add link -->
    <h4 style="margin-bottom:8px;font-size:.85rem">➕ 添加链接</h4>
    <label>分类</label>
    <select id="newCategory">
      <option value="学习资源">📚 学习资源</option>
      <option value="副业赚钱">💰 副业赚钱</option>
      <option value="AI工具">🤖 AI工具</option>
      <option value="影视推荐">🎬 影视推荐</option>
      <option value="其他资源">📦 其他资源</option>
    </select>
    <label>标题</label>
    <input type="text" id="newTitle" placeholder="例如：英语学习大礼包">
    <label>描述（可选）</label>
    <input type="text" id="newDesc" placeholder="简短描述">
    <label>图片URL</label>
    <input type="text" id="newImage" placeholder="https://... 或留空">
    <label>链接URL</label>
    <input type="text" id="newUrl" placeholder="https://...">

    <div class="btn-row">
      <button class="btn-primary" id="addLink" style="flex:2">✅ 添加</button>
      <button class="btn-outline" id="cancelEdit" style="flex:1;display:none">取消编辑</button>
    </div>
    <input type="hidden" id="editIndex" value="-1">

    <hr>

    <!-- Link list -->
    <h4 style="margin-bottom:8px;font-size:.85rem">📋 已有链接 (<span id="linkCount">0</span>)</h4>
    <div id="linkList"></div>

    <hr>

    <!-- Export -->
    <button class="btn-primary" id="exportBtn">📋 导出数据备份</button>
    <button class="btn-outline" id="resetBtn">🔄 清空全部数据</button>
  </div>
</div>

<script>
// ==================== STORAGE ====================
const STORAGE_KEY = 'link3_data';

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  let data;
  if(raw){
    data = JSON.parse(raw);
    // Migrate: add cat field to old links
    let migrated = false;
    data.links.forEach(l => {
      if(!l.cat){ l.cat = '其他资源'; migrated = true; }
    });
    if(migrated) saveData(data);
    return data;
  }
  return {

function saveData(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)) }

// ==================== RENDER PUBLIC ====================
let activeCategory = 'all';
let searchTerm = '';

function renderPublic(){
  const data = loadData();
  const p = data.profile;
  document.getElementById('profileAvatar').src = p.avatar || getDefaultAvatar();
  document.getElementById('profileName').textContent = p.name;
  document.getElementById('profileBio').textContent = p.bio;

  // QR code
  const qrUrl = p.qrCode || '';
  const qrDefault = "data:image/svg+xml," + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">'+
    '<rect width="100" height="100" fill="#1a1a2e" rx="10"/>'+
    '<text x="50" y="60" text-anchor="middle" fill="#555" font-size="14" font-family="sans-serif">二维码</text></svg>'
  );
  document.getElementById('qrCodeImg').src = qrUrl || qrDefault;
  document.getElementById('qrModalImg').src = qrUrl || qrDefault;

  // Category tabs - always show all 5 presets
  const cats = ['all','学习资源','副业赚钱','AI工具','影视推荐','其他资源'];
  const catLabels = { all:'全部', '学习资源':'📚 学习', '副业赚钱':'💰 副业', 'AI工具':'🤖 AI', '影视推荐':'🎬 影视', '其他资源':'📦 其他' };
  const tabsEl = document.getElementById('catTabs');
  tabsEl.innerHTML = cats.map(c => {
    const label = catLabels[c] || c;
    return `<span class="cat-tab${c===activeCategory?' active':''}" data-cat="${c}">${label}</span>`;
  }).join('');

  // Filter links
  let filtered = activeCategory === 'all'
    ? data.links
    : data.links.filter(l => (l.cat || '其他资源') === activeCategory);

  // Search filter
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(l =>
      l.title.toLowerCase().includes(q) ||
      (l.desc||'').toLowerCase().includes(q)
    );
  }

  const container = document.getElementById('linksContainer');
  container.innerHTML = filtered.map((l,i) => `
    <a href="${esc(l.url)}" target="_blank" rel="noopener" class="link-card">
      <img class="link-thumb" src="${l.image || getDefaultIcon(i)}" onerror="this.src='${getDefaultIcon(i)}'" alt="">
      <div class="link-info">
        <div class="link-title">${esc(l.title)}</div>
        ${l.desc ? `<div class="link-desc">${esc(l.desc)}</div>` : ''}
      </div>
      <span class="link-arrow">→</span>
    </a>
  `).join('');
}

// ==================== BACKGROUND ====================
function applyBackground(){
  const data = loadData();
  const bg = data.background;
  const bgLayer = document.getElementById('bgLayer');
  const bgImage = document.getElementById('bgImage');

  // Reset
  bgLayer.style.background = '#080812';
  bgImage.style.backgroundImage = '';
  bgImage.style.opacity = '0';

  const presets = {
    default: '#080812',
    cyber: 'linear-gradient(135deg,#0a0a1a,#0d0d2b)',
    midnight: 'linear-gradient(180deg,#0b0b1a,#1a0a2e)',
    ocean: 'linear-gradient(180deg,#0a1628,#0a1a2e)',
    emerald: 'linear-gradient(180deg,#0a0f0a,#0a1a12)',
  };

  if(bg.url){
    // Custom image
    bgLayer.style.background = '#080812';
    bgImage.style.backgroundImage = `url(${bg.url})`;
    bgImage.style.opacity = (bg.opacity / 100).toString();
  } else if(presets[bg.type]){
    bgLayer.style.background = presets[bg.type];
  }

  // Update presets UI
  document.querySelectorAll('.bg-preset').forEach(el => {
    el.classList.toggle('active', el.dataset.bg === bg.type && !bg.url);
  });
  if(bg.url){
    document.querySelectorAll('.bg-preset').forEach(el => el.classList.remove('active'));
    document.querySelector('[data-bg="custom"]').classList.add('active');
  }
  document.getElementById('editBgOpacity').value = bg.opacity;
}

// ==================== DEFAULT ICONS ====================
function getDefaultAvatar(){
  return 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">'+
    '<circle cx="50" cy="35" r="18" fill="#333"/>'+
    '<ellipse cx="50" cy="88" rx="32" ry="20" fill="#333"/>'+
    '<circle cx="50" cy="50" r="36" fill="none" stroke="#444" stroke-width="2" stroke-dasharray="8 4"/></svg>'
  );
}

function getDefaultIcon(i){
  const c = ['#00d4ff','#7b2fff','#00e396','#ffb800','#ff3d71','#0095ff','#00d68f','#ff6b35'][i%8];
  return 'data:image/svg+xml,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">`+
    `<rect width="100" height="100" fill="${c}" rx="20" opacity=".15"/>`+
    `<text x="50" y="62" text-anchor="middle" fill="${c}" font-size="36" font-family="sans-serif" opacity=".8">📦</text></svg>`
  );
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Add/Edit link
document.getElementById('addLink').addEventListener('click', ()=>{
  const title = document.getElementById('newTitle').value.trim();
  const url = document.getElementById('newUrl').value.trim();
  if(!title || !url){ alert('标题和链接不能为空'); return; }
  const link = {
    title,
    desc: document.getElementById('newDesc').value.trim(),
    image: document.getElementById('newImage').value.trim(),
    url,
    cat: document.getElementById('newCategory').value
  };
  const data = loadData();
  const idx = parseInt(document.getElementById('editIndex').value);
  if(idx >= 0) data.links[idx] = link;
  else data.links.push(link);
  saveData(data);
  renderPublic();
  renderLinkList();
  resetAddForm();
});

function resetAddForm(){
  ['newTitle','newDesc','newImage','newUrl'].forEach(id => document.getElementById(id).value='');
  document.getElementById('editIndex').value='-1';
  document.getElementById('addLink').textContent='✅ 添加';
  document.getElementById('cancelEdit').style.display='none';
}

document.getElementById('cancelEdit').addEventListener('click', resetAddForm);

function renderLinkList(){
  const data = loadData();
  document.getElementById('linkCount').textContent = data.links.length;
  document.getElementById('linkList').innerHTML = data.links.map((l,i) => `
    <div class="link-item">
      <img class="thumb-sm" src="${l.image || getDefaultIcon(i)}" onerror="this.src='${getDefaultIcon(i)}'">
      <div class="info">
        <div class="t">${esc(l.title)} <span style="font-size:.68rem;color:#555">· ${esc(l.cat||'其他')}</span></div>
        <div class="u">${esc(l.url)}</div>
      </div>
      <div class="btns">
        <button onclick="editLink(${i})" title="编辑">✏️</button>
        <button onclick="moveLink(${i},-1)" title="上移">↑</button>
        <button onclick="moveLink(${i},1)" title="下移">↓</button>
        <button onclick="deleteLink(${i})" title="删除">🗑️</button>
      </div>
    </div>
  `).join('');
}

window.editLink = function(i){
  const data = loadData();
  const l = data.links[i];
  document.getElementById('newCategory').value = l.cat || '其他资源';
  document.getElementById('newTitle').value = l.title;
  document.getElementById('newDesc').value = l.desc||'';
  document.getElementById('newImage').value = l.image||'';
  document.getElementById('newUrl').value = l.url;
  document.getElementById('editIndex').value = i;
  document.getElementById('addLink').textContent = '✏️ 更新';
  document.getElementById('cancelEdit').style.display = 'block';
};

window.deleteLink = function(i){
  if(!confirm('确定删除？')) return;
  const data = loadData();
  data.links.splice(i,1);
  saveData(data);
  renderPublic();
  renderLinkList();
};

window.moveLink = function(i,dir){
  const data = loadData();
  const j = i+dir;
  if(j<0||j>=data.links.length) return;
  [data.links[i],data.links[j]]=[data.links[j],data.links[i]];
  saveData(data);
  renderPublic();
  renderLinkList();
};

// Export - generate complete deployable HTML
document.getElementById('exportBtn').addEventListener('click',()=>{
  const data = loadData();
  const dataJson = JSON.stringify(data, null, 2);

  // Get current page source and replace default data
  let html = document.documentElement.outerHTML;

  // Replace the default data fallback in loadData()
  // Pattern: the "return {" after "// Migrate:" block that's the default
  html = html.replace(
    /(function loadData\(\)\{[\s\S]*?if\(migrated\) saveData\(data\);[\s\S]*?return data;[\s\S]*?\})[\s\S]*?return \{[\s\S]*?(profile:[\s\S]*?links: \[[\s\S]*?\])\s*\}/,
    function(match, keepPart, defaultData) {
      return keepPart + '\n  return ' + dataJson + ';';
    }
  );

  // If the regex didn't match, inject data into localStorage fallback
  if(html.indexOf(dataJson) === -1) {
    // Fallback: find the loadData function's default return and replace
    html = html.replace(
      /(loadData\(\)\{[\s\S]*?if\(migrated\)[\s\S]*?return data;\s*\})\s*return \{[\s\S]*?links:\s*\[[\s\S]*?\]\s*\}/,
      '$1\n  return ' + dataJson + ';'
    );
  }

  // Download
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 已导出 index.html\n请将文件上传到 GitHub 替换旧文件即可更新线上内容');
});
